name: Selenium tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selenium:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run Selenium test (headless)
        env:
          CI: true
          GITHUB_ACTIONS: true
        run: npm run start
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selenium-artifacts
          path: |
            reports/**
            screenshots/**
